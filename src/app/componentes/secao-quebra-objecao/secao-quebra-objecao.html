<section
  id="objecao"
  class="scroll-mt-24 border-b border-white/5 bg-zinc-900/50 py-20 sm:py-24"
>
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-3xl text-center">
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
        {{ dados.quebraObjecao.titulo }}
      </h2>
      <p class="mt-6 text-lg leading-relaxed text-zinc-300">
        {{ dados.quebraObjecao.texto }}
      </p>
      <p class="mt-8 text-sm font-semibold uppercase tracking-wider text-zinc-500">
        {{ dados.quebraObjecao.pergunta }}
      </p>
      <ul
        class="mx-auto mt-6 grid max-w-md gap-3 text-left sm:max-w-lg"
        role="list"
      >
        @for (p of dados.quebraObjecao.pontosNegativos; track p) {
          <li
            class="flex items-start gap-3 rounded-xl border border-red-500/15 bg-red-500/5 px-4 py-3 text-zinc-200"
          >
            <span class="mt-0.5 shrink-0 text-red-400" aria-hidden="true">✕</span>
            <span>{{ p }}</span>
          </li>
        }
      </ul>
      <p class="mt-10 text-lg font-medium text-emerald-400/90">
        {{ dados.quebraObjecao.fechamento }}
      </p>
    </div>
  </div>
</section>
