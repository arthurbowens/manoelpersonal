<section
  class="relative overflow-hidden border-b border-white/5 bg-zinc-950 pt-24 pb-20 sm:pt-28 sm:pb-24"
  aria-labelledby="hero-headline"
>
  <div
    class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_80%_50%_at_50%_-20%,rgba(16,185,129,0.15),transparent)]"
  ></div>
  <div
    class="pointer-events-none absolute inset-0 opacity-[0.35] [background-image:linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] [background-size:64px_64px]"
  ></div>

  <div class="relative mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="grid items-center gap-10 lg:grid-cols-2 lg:gap-12 xl:gap-16">
      <div class="max-w-xl lg:max-w-none">
        <p
          class="mb-4 inline-flex items-center gap-2 rounded-full border border-emerald-500/20 bg-emerald-500/10 px-3 py-1 text-xs font-medium uppercase tracking-wider text-emerald-300"
        >
          {{ dados.cargo }}
        </p>
        <h1
          id="hero-headline"
          class="text-3xl font-bold tracking-tight text-white sm:text-4xl lg:text-5xl xl:text-[2.75rem] xl:leading-tight"
        >
          {{ dados.hero.headline }}
        </h1>
        <p class="mt-6 text-base leading-relaxed text-zinc-300 sm:text-lg">
          {{ dados.hero.subheadline }}
        </p>

        <div
          class="mt-8 rounded-2xl border-2 border-emerald-500/35 bg-gradient-to-br from-emerald-500/15 via-emerald-500/5 to-transparent p-4 shadow-lg shadow-emerald-900/20 sm:p-5"
        >
          <p class="text-xs font-bold uppercase tracking-[0.2em] text-emerald-400">Prova rápida</p>
          <p class="mt-2 text-base font-medium leading-snug text-zinc-50 sm:text-lg">
            {{ dados.hero.provaRapida }}
          </p>
        </div>

        <div class="mt-10">
          <a
            [href]="whatsappUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex w-full items-center justify-center rounded-full bg-emerald-500 px-8 py-4 text-base font-bold text-zinc-950 shadow-xl shadow-emerald-500/40 transition hover:bg-emerald-400 sm:w-auto"
          >
            {{ dados.hero.ctas.principal }}
          </a>
          <p class="mt-3 text-center text-sm text-zinc-400 sm:text-left">
            {{ dados.hero.microcopyBotao }}
          </p>
        </div>
      </div>

      <div class="relative mx-auto w-full max-w-lg lg:mx-0 lg:max-w-none">
        <div
          class="absolute -inset-4 rounded-[2rem] bg-gradient-to-br from-emerald-500/20 via-transparent to-teal-600/10 blur-2xl"
          aria-hidden="true"
        ></div>
        <figure
          class="relative overflow-hidden rounded-2xl border border-white/10 bg-zinc-900 shadow-2xl shadow-black/40 ring-1 ring-white/5"
        >
          <img
            [src]="dados.imagens.principal"
            alt="Manoel Ednaldo em prova de corrida na rua, com foco e determinação."
            class="aspect-[4/5] w-full object-cover object-center sm:aspect-[3/4]"
            width="600"
            height="800"
            fetchpriority="high"
          />
          <figcaption class="sr-only">Manoel Ednaldo participando de corrida de rua.</figcaption>
        </figure>
      </div>
    </div>
  </div>
</section>
