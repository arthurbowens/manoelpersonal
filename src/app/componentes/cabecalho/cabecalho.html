<header
  class="fixed inset-x-0 top-0 z-50 border-b border-white/[0.06] bg-zinc-950/85 backdrop-blur-xl backdrop-saturate-150"
>
  <div
    class="mx-auto flex h-[4.25rem] max-w-6xl items-center justify-between gap-3 px-4 sm:gap-4 sm:px-6 lg:px-8"
  >
    <a
      href="#"
      class="group relative flex min-w-0 items-center gap-3 rounded-lg py-1 pr-1 outline-offset-4 transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-emerald-500/60"
      [attr.aria-label]="dados.marca.prefixo + dados.marca.sufixo"
      (click)="fecharMenu()"
    >
      <span
        class="relative h-9 w-[3px] shrink-0 overflow-hidden rounded-full bg-gradient-to-b from-emerald-300 via-emerald-500 to-teal-700 shadow-[0_0_20px_-2px_rgba(52,211,153,0.55)] transition duration-300 group-hover:h-10 group-hover:shadow-[0_0_24px_-2px_rgba(52,211,153,0.65)]"
        aria-hidden="true"
      ></span>
      <span class="flex min-w-0 flex-col leading-none sm:flex-row sm:items-baseline sm:gap-1.5">
        <span
          class="truncate text-[0.95rem] font-semibold tracking-[-0.04em] text-white antialiased sm:text-[1.02rem]"
          >{{ dados.marca.prefixo }}</span
        >
        <span
          class="mt-0.5 text-[0.7rem] font-semibold uppercase tracking-[0.22em] text-emerald-400/95 sm:mt-0 sm:text-[0.72rem] sm:tracking-[0.18em]"
          >{{ dados.marca.sufixo }}</span
        >
      </span>
    </a>

    <nav
      class="hidden items-center gap-0.5 lg:flex"
      aria-label="Principal"
    >
      <a
        href="#objecao"
        class="rounded-lg px-2.5 py-2 text-[13px] font-medium text-zinc-500 transition-colors duration-200 hover:text-white"
        >Por quê</a
      >
      <a
        href="#sobre"
        class="rounded-lg px-2.5 py-2 text-[13px] font-medium text-zinc-500 transition-colors duration-200 hover:text-white"
        >Sobre</a
      >
      <a
        href="#servicos"
        class="rounded-lg px-2.5 py-2 text-[13px] font-medium text-zinc-500 transition-colors duration-200 hover:text-white"
        >Serviços</a
      >
      <a
        href="#diferencial"
        class="rounded-lg px-2.5 py-2 text-[13px] font-medium text-zinc-500 transition-colors duration-200 hover:text-white"
        >Diferencial</a
      >
      <a
        href="#depoimentos"
        class="rounded-lg px-2.5 py-2 text-[13px] font-medium text-zinc-500 transition-colors duration-200 hover:text-white"
        >Depoimentos</a
      >
      <a
        href="#contato"
        class="rounded-lg px-2.5 py-2 text-[13px] font-medium text-zinc-500 transition-colors duration-200 hover:text-white"
        >Contato</a
      >
    </nav>

    <div class="flex shrink-0 items-center gap-2 sm:gap-3">
      @if (dados.contato.instagram) {
        <a
          [href]="dados.contato.instagram"
          target="_blank"
          rel="noopener noreferrer"
          class="flex h-11 w-11 items-center justify-center rounded-xl border border-white/10 bg-white/[0.04] text-zinc-200 transition hover:border-fuchsia-500/30 hover:text-fuchsia-300"
          aria-label="Abrir perfil no Instagram"
          (click)="fecharMenu()"
        >
          <svg class="h-[22px] w-[22px]" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"
            />
          </svg>
        </a>
      }
      <a
        [href]="whatsappUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex items-center gap-2 rounded-full bg-emerald-500 px-3.5 py-2.5 text-sm font-semibold text-zinc-950 shadow-[0_0_0_1px_rgba(52,211,153,0.35),0_8px_32px_-8px_rgba(16,185,129,0.45)] transition hover:bg-emerald-400 hover:shadow-[0_0_0_1px_rgba(52,211,153,0.5),0_12px_36px_-8px_rgba(16,185,129,0.55)]"
        (click)="fecharMenu()"
      >
        <svg class="h-[18px] w-[18px]" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
          />
        </svg>
        <span>WhatsApp</span>
      </a>

      <button
        type="button"
        class="flex h-11 w-11 items-center justify-center rounded-xl border border-white/10 bg-white/[0.04] text-zinc-200 transition hover:border-white/20 hover:bg-white/[0.08] lg:hidden"
        [attr.aria-expanded]="menuAberto()"
        aria-controls="menu-mobile"
        (click)="alternarMenu()"
      >
        @if (menuAberto()) {
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
          <span class="sr-only">Fechar menu</span>
        } @else {
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
          <span class="sr-only">Abrir menu</span>
        }
      </button>
    </div>
  </div>

  @if (menuAberto()) {
    <div
      id="menu-mobile"
      class="border-t border-white/[0.06] bg-zinc-950/98 px-4 py-4 backdrop-blur-xl lg:hidden"
    >
      <nav class="flex flex-col gap-0.5" aria-label="Principal mobile">
        <a
          href="#objecao"
          class="rounded-lg px-3 py-3 text-sm font-medium text-zinc-300 transition hover:bg-white/5 hover:text-white"
          (click)="fecharMenu()"
          >Por quê</a
        >
        <a
          href="#sobre"
          class="rounded-lg px-3 py-3 text-sm font-medium text-zinc-300 transition hover:bg-white/5 hover:text-white"
          (click)="fecharMenu()"
          >Sobre</a
        >
        <a
          href="#servicos"
          class="rounded-lg px-3 py-3 text-sm font-medium text-zinc-300 transition hover:bg-white/5 hover:text-white"
          (click)="fecharMenu()"
          >Serviços</a
        >
        <a
          href="#diferencial"
          class="rounded-lg px-3 py-3 text-sm font-medium text-zinc-300 transition hover:bg-white/5 hover:text-white"
          (click)="fecharMenu()"
          >Diferencial</a
        >
        <a
          href="#depoimentos"
          class="rounded-lg px-3 py-3 text-sm font-medium text-zinc-300 transition hover:bg-white/5 hover:text-white"
          (click)="fecharMenu()"
          >Depoimentos</a
        >
        <a
          href="#contato"
          class="rounded-lg px-3 py-3 text-sm font-medium text-emerald-400/90 transition hover:bg-emerald-500/10 hover:text-emerald-300"
          (click)="fecharMenu()"
          >Contato</a
        >
      </nav>
    </div>
  }
</header>
