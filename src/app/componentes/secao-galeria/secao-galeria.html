<section id="galeria" class="scroll-mt-24 border-b border-white/5 bg-zinc-900/40 py-20 sm:py-24">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl">
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
        {{ dados.galeriaSecao.titulo }}
      </h2>
      <p class="mt-4 text-lg text-zinc-400">
        {{ dados.galeriaSecao.subtitulo }}
      </p>
    </div>

    <ul class="mt-12 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      @for (item of dados.galeria; track item.id) {
        <li class="group overflow-hidden rounded-2xl border border-white/10 bg-zinc-950">
          <div class="relative aspect-[4/5] overflow-hidden bg-zinc-900">
            @if (item.imagemUrl) {
              <img
                [src]="item.imagemUrl"
                [alt]="item.legenda"
                class="h-full w-full object-cover transition duration-500 group-hover:scale-105"
                loading="lazy"
                width="400"
                height="500"
              />
            } @else {
              <div
                class="flex h-full w-full flex-col items-center justify-center gap-3 bg-gradient-to-br from-zinc-800 to-zinc-950 p-6 text-center"
              >
                <span
                  class="rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs font-medium uppercase tracking-wide text-zinc-500"
                  >Foto em breve</span
                >
                <span class="text-sm text-zinc-500">{{ item.legenda }}</span>
              </div>
            }
          </div>
          <p class="border-t border-white/5 px-4 py-3 text-sm font-medium text-zinc-300">
            {{ item.legenda }}
          </p>
        </li>
      }
    </ul>
  </div>
</section>
