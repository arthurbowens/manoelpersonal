<section id="diferencial" class="scroll-mt-24 border-b border-white/5 bg-zinc-950 py-20 sm:py-24">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
        {{ dados.diferencial.titulo }}
      </h2>
    </div>
    <ul
      class="mx-auto mt-14 grid max-w-3xl gap-4 sm:grid-cols-1"
      role="list"
    >
      @for (item of dados.diferencial.itens; track item) {
        <li
          class="flex items-start gap-4 rounded-2xl border border-emerald-500/20 bg-emerald-500/5 px-5 py-4 text-left text-zinc-100 shadow-lg shadow-emerald-900/10"
        >
          <span
            class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-emerald-500/20 text-sm text-emerald-400"
            aria-hidden="true"
            >✓</span
          >
          <span class="text-base leading-relaxed">{{ item }}</span>
        </li>
      }
    </ul>
  </div>
</section>
